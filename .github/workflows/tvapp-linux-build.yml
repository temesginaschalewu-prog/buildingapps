name: Build TV App Linux

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tvapp-linux-${{ github.ref }}
  cancel-in-progress: true

env:
  API_BASE_URL: https://api.familyacademy.et
  APP_VERSION: 1.0.0
  APP_ENVIRONMENT: production
  CMAKE_POLICY_VERSION_MINIMUM: 3.5
  CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libsecret-1-dev libmpv-dev pkg-config

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop
        working-directory: familyacademy_tv_app

      - name: Clean
        run: flutter clean
        working-directory: familyacademy_tv_app

      - name: Get dependencies
        run: flutter pub get
        working-directory: familyacademy_tv_app

      - name: Create .env file
        run: |
          cat > .env <<EOF
          API_BASE_URL=${API_BASE_URL}
          APP_VERSION=${APP_VERSION}
          APP_ENVIRONMENT=${APP_ENVIRONMENT}
          EOF
        working-directory: familyacademy_tv_app

      - name: Build Linux Release
        run: flutter build linux --release --dart-define=API_BASE_URL=${API_BASE_URL}
        working-directory: familyacademy_tv_app

      - name: Package Linux bundle
        run: |
          mkdir -p artifacts
          tar -C familyacademy_tv_app/build/linux/x64/release/bundle -czf artifacts/tvapp-linux.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvapp-linux
          path: artifacts/tvapp-linux.tar.gz
          compression-level: 0
