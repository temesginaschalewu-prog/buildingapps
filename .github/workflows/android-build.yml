name: Build Android App

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: client-android-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: https://family-academy-backend-a12l.onrender.com
  API_VERSION: v1
  API_BASE_URL: https://family-academy-backend-a12l.onrender.com
  APP_NAME: Family Academy
  APP_VERSION: 1.5.0
  APP_ENVIRONMENT: production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          cat > .env <<EOF
          BASE_URL=${BASE_URL}
          API_VERSION=${API_VERSION}
          API_BASE_URL=${API_BASE_URL}
          APP_NAME=${APP_NAME}
          APP_VERSION=${APP_VERSION}
          APP_ENVIRONMENT=${APP_ENVIRONMENT}
          EOF

      - name: Create debug keystore for CI fallback signing
        run: |
          mkdir -p ~/.android ~/.config/.android
          if [ ! -f ~/.config/.android/debug.keystore ]; then
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore ~/.config/.android/debug.keystore \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          cp ~/.config/.android/debug.keystore ~/.android/debug.keystore

      - name: Build Android APKs
        run: flutter build apk --release --split-per-abi --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Build Android App Bundle
        run: flutter build appbundle --release --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Upload Split APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: family-academy-android-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          compression-level: 0

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: family-academy-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          compression-level: 0
