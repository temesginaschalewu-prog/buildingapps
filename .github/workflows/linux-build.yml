name: Build Linux App

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: client-linux-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: https://family-academy-backend-a12l.onrender.com
  API_VERSION: v1
  API_BASE_URL: https://family-academy-backend-a12l.onrender.com
  APP_NAME: Family Academy
  APP_VERSION: 1.5.0
  APP_ENVIRONMENT: production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libsecret-1-dev libmpv-dev pkg-config

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          cat > .env <<EOF
          BASE_URL=${BASE_URL}
          API_VERSION=${API_VERSION}
          API_BASE_URL=${API_BASE_URL}
          APP_NAME=${APP_NAME}
          APP_VERSION=${APP_VERSION}
          APP_ENVIRONMENT=${APP_ENVIRONMENT}
          EOF

      - name: Build Linux Release
        run: flutter build linux --release --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Package Linux bundle
        run: |
          mkdir -p artifacts
          tar -C build/linux/x64/release/bundle -czf artifacts/family-academy-linux.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: family-academy-linux
          path: artifacts/family-academy-linux.tar.gz
          compression-level: 0
