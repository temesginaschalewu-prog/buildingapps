name: Build macOS App

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: client-macos-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: https://family-academy-backend-a12l.onrender.com
  API_VERSION: v1
  API_BASE_URL: https://family-academy-backend-a12l.onrender.com
  APP_NAME: Family Academy
  APP_VERSION: 1.5.0
  APP_ENVIRONMENT: production

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS Desktop
        run: flutter config --enable-macos-desktop

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          cat > .env <<EOF
          BASE_URL=${BASE_URL}
          API_VERSION=${API_VERSION}
          API_BASE_URL=${API_BASE_URL}
          APP_NAME=${APP_NAME}
          APP_VERSION=${APP_VERSION}
          APP_ENVIRONMENT=${APP_ENVIRONMENT}
          EOF

      - name: Build macOS Release
        run: flutter build macos --release --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Package macOS app
        run: |
          mkdir -p artifacts
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No macOS .app bundle found in build output"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" artifacts/family-academy-macos.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: family-academy-macos
          path: artifacts/family-academy-macos.zip
          compression-level: 0
