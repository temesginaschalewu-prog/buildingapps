name: familyacademyclient
description: "Family Academy - Educational Platform with Full Offline Support"
publish_to: 'none'

version: 1.5.0+1  

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  
  go_router: ^17.0.1
  provider: ^6.1.5+1
  collection: ^1.18.0
  
  
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  device_info_plus: ^12.1.0
  path_provider: ^2.1.5
  hive: ^2.2.3  
  hive_flutter: ^1.1.0  
  
  
  dio: ^5.9.0
  connectivity_plus: ^7.0.0
  
  
  intl: ^0.20.2
  uuid: ^4.5.2
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  permission_handler: ^12.0.1
  flutter_dotenv: ^6.0.0
  crypto: ^3.0.7

  
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  flutter_animate: ^4.0.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  pull_to_refresh: ^2.0.0
  fl_chart: ^1.1.1
  percent_indicator: ^4.2.3
  pin_code_fields: ^9.1.0

  
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7  
  wakelock_plus: ^1.4.0
  video_player: ^2.11.0
  chewie: ^1.13.0
  
  
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  file_picker: ^10.3.10

  
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^21.0.0

  
  flutter_form_builder: ^10.2.0
  form_validator: ^2.1.1

  
  syncfusion_flutter_pdfviewer: ^33.1.44
  flutter_widget_from_html: ^0.17.1

  
  timezone: ^0.11.0
  path: ^1.9.0
  media_kit_native_event_loop: ^1.0.9
  media_kit_libs_android_video: ^1.3.8
  media_kit_libs_ios_video: ^1.1.4

  
  workmanager: ^0.9.0+3  
  flutter_background_service: ^5.1.0  
  media_kit_libs_linux: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1  
  build_runner: ^2.4.13  

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/Inter-Italic.ttf
          style: italic
        - asset: assets/fonts/Inter/Inter-BoldItalic.ttf
          weight: 700
          style: italic

  assets:
    - assets/images/
