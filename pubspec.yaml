name: familyacademyclient
description: "Family Academy - Educational Platform"
publish_to: 'none'

version: 1.4.2+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  video_player: ^2.10.1
  chewie: ^1.13.0
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.5+1
  get_it: ^9.2.0
  dio: ^5.9.0
  shared_preferences: ^2.5.4
  flutter_form_builder: ^10.2.0
  form_validator: ^2.1.1
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  path: ^1.9.1
  mime: ^2.0.0
  connectivity_plus: ^7.0.0
  intl: ^0.20.2
  uuid: ^4.5.2
  crypto: ^3.0.7
  url_launcher: ^6.3.2
  flutter_local_notifications: ^20.0.0
  firebase_core: ^4.3.0
  firebase_crashlytics: ^5.0.7
  firebase_messaging: ^16.1.0
  fl_chart: ^1.1.1
  syncfusion_flutter_pdfviewer: ^32.1.22
  jiffy: ^6.4.4
  flutter_dotenv: ^6.0.0
  go_router: ^17.0.1
  share_plus: ^12.0.1
  timezone: ^0.10.1
  simple_animations: ^5.1.0
  badges: ^3.1.2
  dotted_border: ^3.1.0
  flutter_animate: ^4.0.0
  device_info_plus: ^12.1.0
  wakelock_plus: ^1.3.3 

  # UI & Animations
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  page_transition: ^2.0.9
  lottie: ^3.3.2
  smooth_page_indicator: ^2.0.1
  confetti: ^0.8.0
  flutter_zoom_drawer: ^3.0.2
  auto_animated: ^3.2.0
  sliding_up_panel: ^2.0.0+1
  flutter_animator: ^3.1.1
  animated_text_kit: ^4.2.2

  # Forms & Inputs
  flutter_colorpicker: ^1.0.3
  country_picker: ^2.0.27
  pin_code_fields: ^8.0.1
  file_picker: ^10.3.10
  flutter_widget_from_html: ^0.17.1

  # Charts & Visualizations
  percent_indicator: ^4.2.3
  circular_countdown: ^2.1.0

  # File & Media
  photo_view: ^0.15.0
  audio_session: ^0.2.2
  just_audio: ^0.10.1
  video_thumbnail: ^0.5.3

  # State Management
  flutter_hooks: ^0.21.3+1
  riverpod: ^2.5.1

  # Networking
  http: ^1.2.2
  retrofit: ^4.1.1+1

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.5.0
  package_info_plus: ^9.0.0
  vibration: ^3.1.5
  webview_flutter: ^4.7.0
  flutter_image_compress: ^2.4.0
  flutter_launcher_icons: ^0.14.4
  pull_to_refresh: ^2.0.0
  animate_do: ^4.2.0
  permission_handler: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_cache_manager: ^3.4.1
  dio_cache_interceptor: ^4.0.5
  flutter_slidable: ^4.0.3
  flutter_staggered_animations: ^1.1.1
  toggle_switch: ^2.3.0
  modal_bottom_sheet: ^3.0.0
  curved_navigation_bar: ^1.0.6
  flutter_neumorphic: ^3.2.0
  flutter_chat_bubble: ^2.0.2
  
  # FIXED: MediaKit with Windows support
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  media_kit_libs_windows_video: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  json_serializable: ^6.11.3
  flutter_gen_runner: ^5.12.0
  retrofit_generator: ^10.2.1
  animations: ^2.0.11

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/Inter-Italic.ttf
          style: italic
        - asset: assets/fonts/Inter/Inter-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto/Roboto-Italic.ttf
          style: italic
        - asset: assets/fonts/Roboto/Roboto-BoldItalic.ttf
          weight: 700
          style: italic

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/lottie/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png  
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logo.png
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"